<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <style>
    .container {
      column-count: 4;
      column-gap: 10px;
      column-rule: 1px solid #ccc;
      gap: 10px;
    }

    .card {
      margin: 15px;
      background: honeydew;
      border-radius: 10px;
      margin: 15px;
      break-inside: avoid;
      padding-bottom: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      Lorem ipsum dolor sit, amet consectetur adipisicing elit. Tempora
      dolorum veniam iste! Consectetur reiciendis itaque iste veniam maxime
      tenetur placeat libero enim minima inventore? Iure incidunt quia rerum
      laborum hic!
    </div>
    <div class="card">waleed</div>
    <div class="card">haris</div>
    <div class="card">tayyab</div>
    <div class="card">jameel</div>
    <div class="card">jamal</div>
  </div>
</body>

</html>
