<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .float-container {
        background-color: antiquewhite;
        width: 100%;
        padding: 20px;
        overflow: auto;
      }

      .float-left {
        float: left;
        width: 50%;
        background-color: blue;
        color: aliceblue;
        padding: 15px;
        border-radius: 13px;
        margin-top: 10px;
      }

      .float-right {
        float: right;
        width: 50%;
        background-color: rebeccapurple;
        color: aliceblue;
        padding: 15px;
        border-radius: 13px;
        margin-top: 10px;
      }

      .bottom {
        text-align: center;
        width: 100%;
        background-color: orange;
        color: aliceblue;
        padding: 15px;
        border-radius: 13px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="float-container">
      <div class="float-left">Left</div>
      <div class="float-right">Right</div>
    </div>
    <div class="bottom">Bottom</div>
  </body>
</html>
