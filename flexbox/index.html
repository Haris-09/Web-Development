<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        .flex-container{
            display: flex;
            justify-content: space-between;
            border: solid black;
            padding: 10px;
            margin: auto;
            flex-wrap: wrap;
        }
        .flex-item1{
            text-align: center;
            background-color: blue;
            padding: 10px;
            margin: auto;
            border: solid gray;
            border-radius: 10px;
            min-width: 200px;
        }
        .flex-item2{
            text-align: center;
            background-color: red;
            padding: 10px;
            margin: auto;
            border: solid gray;
            border-radius: 10px;
            min-width: 200px;
        }
        .flex-item3{
            text-align: center;
            background-color: green;
            padding: 10px;
            margin: auto;
            border: solid gray;
            border-radius: 10px;
            min-width: 200px;
        }
        .flex-item4{
            text-align: center;
            background-color: yellow;
            padding: 10px;
            margin: auto;
            border: solid gray;
            border-radius: 10px;
            min-width: 200px;
        }
    </style>
</head>
<body>
    <div class="flex-container">
        <div class="flex-item1">item 1</div>
        <div class="flex-item2">item 2</div>
        <div class="flex-item3">item 3</div>
        <div class="flex-item4">item 4</div>
        <div></div>
    </div>
</body>
</html>
