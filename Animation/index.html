<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom, Rotate, Move</title>
    <style>
    .zoom {
        background-color: green;
        transition: transform .2s;
        width: 100px;
        height: 100px;
        margin: auto;
    }
    .zoom:hover {
        transform: scale(1.5);
        }
    .box1 {
            width: 100px;
            height: 100px;
            background: lightblue;
            text-align: center;
            /* border-radius: 50%; */
            margin: auto;
            animation: rotatebox 5s linear infinite;

        }
        @keyframes rotatebox {
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        }
    .box2 {
           width: 100px;
           height: 100px;
           background: blue;
           /* border-radius: 50%; */
           margin: auto;
           animation: movebox 5s linear infinite;

        }
        @keyframes movebox {
            0%{transform: translate(0px,0px);}
            25%{transform: translate(200px,0px);}
            50%{transform: translate(200px,200px);}
            75%{transform: translate(0px,200px);}
            100%{transform: translate(0px,0px);}
        }
    </style>
</head>
<body>
    <div class="zoom"></div>
    <div class="box1"></div>
    <div class="box2"></div>
</body>
</html>
